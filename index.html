<!doctype html>
<html lang="ja" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メガテン5V 悪魔弱点検索</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111210;
      --surface: #1a1916;
      --surface2: #21201d;
      --border: #2e2d2a;
      --text: #d8d6d0;
      --muted: #7a7872;
      --faint: #4a4845;
      --accent: #c8903a;
      --accent2: #4f8fa3;
      --weak: #ff6b6b;
      --resist: #6ec97a;
      --null: #e8b84b;
      --drain: #4ecdc4;
      --repel: #b79af5;
      --radius: 8px;
    }

    [data-theme="light"] {
      --bg: #f5f4f0;
      --surface: #faf9f6;
      --surface2: #fff;
      --border: #dddbd6;
      --text: #2a2820;
      --muted: #7a7872;
      --faint: #b8b6b0;
      --accent: #b07820;
      --accent2: #2a6e80;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth
    }

    body {
      font-family: 'Satoshi', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: 0
    }

    a,
    button,
    [role="button"],
    input,
    select {
      transition: color 180ms, background 180ms, border-color 180ms, box-shadow 180ms
    }

    button {
      cursor: pointer;
      background: none;
      border: none;
      color: inherit
    }

    img {
      display: block;
      max-width: 100%
    }

    ::selection {
      background: oklch(0.65 0.15 60 / 0.25);
      color: var(--text)
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 4px
    }

    /* Layout */
    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 12px
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      flex-shrink: 0
    }

    .logo-text h1 {
      font-size: clamp(1rem, 2vw, 1.25rem);
      font-weight: 700;
      letter-spacing: .02em;
      line-height: 1.1
    }

    .logo-text p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-top: 2px
    }

    .theme-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      color: var(--muted);
      border: 1px solid var(--border)
    }

    .theme-btn:hover {
      background: var(--surface2);
      color: var(--text)
    }

    /* Search bar */
    .search-wrap {
      position: relative;
      margin-bottom: 16px
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none
    }

    #search {
      width: 100%;
      padding: 12px 14px 12px 42px;
      font-size: 16px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none
    }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px oklch(0.65 0.15 60 / 0.18)
    }

    #search::placeholder {
      color: var(--faint)
    }

    .filter-wrap {
      margin-bottom: 20px;
    }

    .filter-toggle {
      padding: 6px 14px;
      font-size: 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: transparent;
      cursor: pointer;
    }

    .filter-toggle:hover {
      background: var(--surface2);
      color: var(--text);
    }

    /* Filter row */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center
    }

    .filter-label {
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0
    }

    .tribe-btn {
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      white-space: nowrap
    }

    .tribe-btn:hover,
    .tribe-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    .tribe-btn.active {
      font-weight: 600
    }

    /* Stats */
    .stats {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
      height: 20px
    }

    /* Table wrapper */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border)
    }

    .table-wrap::-webkit-scrollbar {
      height: 4px;
    }

    .table-wrap::-webkit-scrollbar-track {
      background: var(--surface);
    }

    .table-wrap::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px
    }

    thead th {
      background: var(--surface);
      padding: 9px 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      border-bottom: 1px solid var(--border);
      text-align: center;
      white-space: nowrap;
      position: sticky;
      top: 0
    }

    thead th:first-child {
      text-align: left;
      padding-left: 16px;
      min-width: 140px
    }

    thead th:nth-child(2) {
      text-align: center;
      min-width: 36px
    }

    thead th:nth-child(3) {
      text-align: center;
      min-width: 72px
    }

    tbody tr {
      border-bottom: 1px solid var(--border)
    }

    tbody tr:last-child {
      border-bottom: none
    }

    tbody tr:hover {
      background: var(--surface2)
    }

    tbody td {
      padding: 9px 8px;
      font-size: 13.5px;
      text-align: center;
      vertical-align: middle
    }

    tbody td:first-child {
      text-align: left;
      padding-left: 16px;
      font-weight: 600;
      font-size: 14px
    }

    tbody td:nth-child(2) {
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums
    }

    tbody td:nth-child(3) {
      font-size: 12px;
      color: var(--muted)
    }

    /* Resistance badges */
    .r {
      display: inline-block;
      min-width: 28px;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      text-align: center
    }

    .r-weak {
      color: var(--weak)
    }

    .r-resist {
      color: var(--resist)
    }

    .r-null {
      color: var(--null)
    }

    .r-drain {
      color: var(--drain)
    }

    .r-repel {
      color: var(--repel)
    }

    .r-normal {
      color: var(--faint)
    }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border)
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted)
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted)
    }

    .empty svg {
      margin: 0 auto 12px;
      opacity: .3
    }

    .empty p {
      font-size: 14px
    }

    /* Column headers with icons */
    .col-icon {
      font-size: 12px;
      display: block
    }

    @media(max-width:600px) {
      thead th:nth-child(3) {
        display: none;
        width: 0;
        padding: 0;
      }

      tbody td:nth-child(3) {
        display: none;
        width: 0;
        padding: 0;
      }

      .r {
        min-width: 16px;
        font-size: 10px;
        padding: 1px 1px;
      }

      tbody td {
        padding: 7px 2px;
      }

      thead th {
        padding: 7px 2px;
      }

      tbody td:first-child {
        width: 72px;
        max-width: 72px;
        font-size: 12px;
        padding-left: 8px;
        white-space: normal;
        word-break: break-all;
      }

      thead th:first-child {
        width: 72px;
        padding-left: 8px;
      }

      thead th:nth-child(3) {
        width: 40px;
        font-size: 10px;
      }

      tbody td:nth-child(3) {
        width: 40px;
        font-size: 10px;
      }

      tbody td:nth-child(2) {
        width: 28px;
        font-size: 11px;
      }

      thead th:nth-child(2) {
        width: 28px;
      }
    }
  </style>
</head>

      <div class="legend-item">

      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--null)"></div><span class="r r-null">無</span> 無効
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--drain)"></div><span class="r r-drain">吸</span> 吸収（HP回復）

      <div class="legend-item">

      </div>
      <div class="legend-item"><span class="r r-normal">–</span> 通常</div>
    </div>
  </div>

      return s.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
    }
    function normalize(s) {
      return kataToHira(s).toLowerCase().replace(/\s/g, '').normalize('NFKC');
    }

    function resClass(v) {
      if (v === '弱') return 'r-weak';
      if (v === '耐') return 'r-resist';
      if (v === '無') return 'r-null';
      if (v === '吸') return 'r-drain';
      if (v === '反') return 'r-repel';
      return 'r-normal';
    }

    function render() {
      const q = normalize(document.getElementById('search').value);
      const tbody = document.getElementById('tbody');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');

      const filtered = DEMONS.filter(d => {
        const matchName = q === '' || normalize(d.n).includes(q) || d.k.includes(q);

        return matchName && matchTribe;
      });

      filtered.sort((a, b) => {
        const aVal = sortKey === 'n' ? a.k : a[sortKey];
        const bVal = sortKey === 'n' ? b.k : b[sortKey];
        if (aVal < bVal) return -1 * sortDir;
        if (aVal > bVal) return 1 * sortDir;
        return 0;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = '';
        stats.textContent = '';
        return;
      }
      empty.style.display = 'none';

          return '<td>' + disp + '</td>';
        }).join('');
        return '<tr><td>' + d.n + '</td><td>' + d.l + '</td><td>' + d.t + '</td>' + cells + '</tr>';
      }).join('');
    }
